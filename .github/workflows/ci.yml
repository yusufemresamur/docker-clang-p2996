name: CI

on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      clang-commit: ${{ steps.clang.outputs.commit }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve clang-p2996 commit
        id: clang
        run: |
          sha=$(git ls-remote https://github.com/bloomberg/clang-p2996.git refs/heads/p2996 | awk '{print $1}')
          echo "commit=$sha" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: dev
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clang-p2996:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/clang-p2996:${{ steps.clang.outputs.commit }}
          build-args: CLANG_COMMIT=${{ steps.clang.outputs.commit }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compile:
    runs-on: ubuntu-latest
    needs: build-and-push
    container:
      image: docker.io/yusufemresamur/clang-p2996:${{ needs.build-and-push.outputs.clang-commit }}
      options: --user root

    steps:
      - uses: actions/checkout@v6
      - name: Compile examples
        run: bazelisk --output_user_root=/tmp/bazel-out build //...
